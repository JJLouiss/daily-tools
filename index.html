<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Tools</title>
    <meta name="description" content="Currency • Work Time • OT • Earnings">

    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Daily%20Tools%22,%22short_name%22:%22DailyTools%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%23667eea%22,%22icons%22:[{%22src%22:%22https://via.placeholder.com/192/667eea/ffffff?text=DT%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22},{%22src%22:%22https://via.placeholder.com/512/667eea/ffffff?text=DT%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e2937; --accent: #667eea; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e2937; --text: #e2e8f0; --accent: #8b9eff; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); margin:0; padding:20px; min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--text); }
        .container { background:var(--card); border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.2); padding:30px; width:100%; max-width:520px; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        button { width:100%; padding:16px; margin:8px 0; background:var(--accent); color:white; border:none; border-radius:12px; font-size:18px; cursor:pointer; }
        .install-guide { padding:15px; background:#f0f9ff; border-radius:12px; text-align:center; margin:15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Daily Tools</h1>
            <button onclick="toggleDarkMode()" id="themeBtn">🌙</button>
        </div>

        <div class="install-guide">
            <strong>✅ Now Hosted Online</strong><br>
            Try installing from the Chrome menu (⋮)
        </div>

        <button onclick="window.location.reload()">Refresh Page</button>
    </div>

    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            deferredPrompt = e;
            alert("✅ Install prompt is ready! Click the three dots ⋮ → Install app");
        });

        function toggleDarkMode() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
