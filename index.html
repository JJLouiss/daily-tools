        /* Same beautiful UI as before with dark mode */
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e2937; --accent: #667eea; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e2937; --text: #e2e8f0; --accent: #8b9eff; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin:0; padding:20px; min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--text); }

<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Daily Tools</h1>
            <button class="theme-toggle" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
        </div>
        
        <!-- Tabs, Currency panel, Work panel, History, etc. — all from previous full version -->

        <div class="install-guide" style="background:#f0f9ff;padding:15px;border-radius:12px;margin:15px 0;text-align:center;">
            <strong>Install as Real App</strong><br>
            <span id="installText">Tap below or use browser menu</span>
        </div>
        <button class="install-btn" onclick="installApp()" id="installBtn" style="display:none;">📲 Install App Now</button>
    </div>

    <script>
        // Paste ALL the JavaScript from the previous full version here (theme, currency, work+pay, history, etc.)
        // ... (I can repaste the full script if needed) ...
        
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', e => {
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'block';
        });

        function installApp() {
            if (deferredPrompt) deferredPrompt.prompt();
        }

        window.onload = () => {
            // Existing init code...
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            document.getElementById('installText').innerHTML = isIOS 
                ? '📱 Share → Add to Home Screen' 
                : '📱 Chrome menu (⋮) → Install app';
        };
    </script>
